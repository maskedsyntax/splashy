<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="round-corner">
      <!-- Standard macOS Big Sur+ corner radius is 160px for a 1024x1024 canvas -->
      <rect x="0" y="0" width="1024" height="1024" rx="160" ry="160" />
    </clipPath>
  </defs>
  <image width="1024" height="1024" href="logo.png" clip-path="url(#round-corner)" />
</svg>
